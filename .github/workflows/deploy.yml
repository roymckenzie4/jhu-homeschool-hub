# Builds BOTH deployed versions into a single GitHub Pages artifact:
#   - `main`  -> site root        -> https://<user>.github.io/jhu-homeschool-hub/
#   - `reorg` -> the /new/ subdir -> https://<user>.github.io/jhu-homeschool-hub/new/
#
# GitHub Pages serves one artifact for the whole site, so every deploy rebuilds
# both branches from their current heads and stitches them together. A push to
# either branch (or a manual run) redeploys the whole site. Each build sets its
# own Vite `base` so asset URLs resolve under the right path.
#
# Collapsing the A/B later: merge reorg -> main, delete the reorg build + the
# /new/ assemble step, and this returns to a single root build.
#
# To enable: Settings -> Pages -> Source = "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, reorg]
  # Manual "Run workflow" button, plus a weekly refresh so the regulation
  # snapshot picks up JHU's sheet edits on its own. NOTE: GitHub only fires
  # `schedule` and `workflow_dispatch` from the DEFAULT branch, so both stay
  # dormant until this file lands on `main` (the reorg -> main merge). Until
  # then the snapshot refreshes on every push to `reorg`.
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1" # Mondays, 12:00 UTC

# Pages deployments need these scoped permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Run the bundled JavaScript actions (checkout, setup-node, etc.) on
# Node.js 24. GitHub is making this the runner default in June 2026 and
# removing Node 20 from runners in September 2026; opting in early avoids
# the deprecation warnings without changing behavior.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Only one Pages deploy at a time; let an in-flight deploy finish rather
# than cancelling it mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Two checkouts into sibling folders so both branches can be built in
      # one job. Pages serves a single artifact, so each deploy rebuilds both.
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout reorg branch
        uses: actions/checkout@v4
        with:
          ref: reorg
          path: reorg

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          # Both lockfiles, since the repo is checked out into subfolders.
          cache-dependency-path: |
            main/package-lock.json
            reorg/package-lock.json

      # main -> site root. VITE_BASE matches the repo path so assets resolve.
      - name: Build main (root)
        working-directory: main
        run: npm ci && npm run build
        env:
          VITE_BASE: /jhu-homeschool-hub/
          # GA4 Measurement ID for the live root build. Set the VITE_GA_ID repo
          # variable to enable analytics; unset = no tracking.
          VITE_GA_ID: ${{ vars.VITE_GA_ID }}

      # Refresh the regulation source-link snapshot from the JHU Google Sheet
      # before building reorg (this branch is where the live-links feature
      # lives; main doesn't have the fetch script). Non-fatal: on any failure
      # — transient API outage, quota — the committed snapshot is used, so a
      # bad fetch can never break the deploy.
      - name: Refresh regulation snapshot (reorg)
        working-directory: reorg
        run: node scripts/fetch-policy-snapshot.mjs || echo "snapshot refresh failed; using committed snapshot"
        env:
          SHEETS_API_KEY: ${{ secrets.SHEETS_API_KEY }}

      # reorg -> /new/ subdirectory. Nested base so its assets resolve under
      # /new/. No VITE_GA_ID: the preview build stays analytics-free for now.
      - name: Build reorg (/new/)
        working-directory: reorg
        run: npm ci && npm run build
        env:
          VITE_BASE: /jhu-homeschool-hub/new/

      # Assemble one site: main at root, reorg nested under /new/. The `/.`
      # copies dotfiles too. No .nojekyll needed (Actions artifacts skip Jekyll).
      - name: Assemble combined site
        run: |
          mkdir -p site
          cp -r main/dist/. site/
          mkdir -p site/new
          cp -r reorg/dist/. site/new/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
